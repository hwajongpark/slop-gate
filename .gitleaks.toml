title = "slop-gate internal-reference detector"

# Extends the default gitleaks ruleset with project-specific patterns.
# Install as a pre-commit hook in the PUBLIC repo so private references from
# the monorepo this was developed in can never reach a public commit.
[extend]
useDefault = true

[[rules]]
id = "private-project-name"
description = "Private project / brand name that must not ship publicly"
regex = '''(?i)seoulstart|gorillavalue'''
tags = ["internal"]

[[rules]]
id = "absolute-home-path"
description = "Absolute path to a local home directory"
regex = '''/Users/[a-z]+/|/home/[a-z]+/'''
tags = ["internal"]

[[rules]]
id = "personal-email"
description = "Personal email address"
regex = '''[a-z0-9._%+-]+@gmail\.com'''
tags = ["internal"]
